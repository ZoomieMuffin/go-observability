receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:

extensions:
  health_check:

exporters:
  debug:

service:
  extensions:
    - health_check
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - debug
    metrics:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - debug
    logs:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - debug
